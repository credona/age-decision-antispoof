name: CI

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

jobs:
    quality:
        name: Quality
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - name: Install tools
              run: |
                  python -m pip install --upgrade pip
                  pip install ruff

            - name: Ruff lint
              run: ruff check .

            - name: Ruff format check
              run: ruff format --check .

            - name: Check trailing whitespace
              run: |
                  if grep -rIn "[[:blank:]]$" antispoof tests scripts docs README.md CHANGELOG.md CONTRIBUTING.md; then
                    echo "Trailing whitespace found"
                    exit 1
                  fi

            - name: Check final newline
              run: |
                  FAILED=0

                  for file in $(find antispoof tests scripts docs -type f \( -name "*.py" -o -name "*.md" \)); do
                    if [ -s "$file" ]; then
                      if [ "$(tail -c1 "$file")" != "" ]; then
                        echo "Missing final newline: $file"
                        FAILED=1
                      fi
                    fi
                  done

                  for file in README.md CHANGELOG.md CONTRIBUTING.md pyproject.toml project.json compatibility.json; do
                    if [ -f "$file" ] && [ -s "$file" ]; then
                      if [ "$(tail -c1 "$file")" != "" ]; then
                        echo "Missing final newline: $file"
                        FAILED=1
                      fi
                    fi
                  done

                  exit $FAILED

            - name: Compile Python files
              run: python -m compileall antispoof tests scripts

    metadata:
        name: Metadata and generated docs
        runs-on: ubuntu-latest
        needs:
            - quality

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - name: Check project metadata
              run: python scripts/check_project_metadata.py

            - name: Check compatibility metadata
              run: python scripts/check_compatibility_metadata.py

            - name: Check generated README examples
              run: |
                  python scripts/update_readme_examples.py
                  git diff --exit-code README.md

            - name: Check generated usage examples
              run: |
                  python scripts/update_docs_usage.py
                  git diff --exit-code docs/usage.md

            - name: Check generated compatibility documentation
              run: |
                  python scripts/update_docs_compatibility.py
                  git diff --exit-code docs/compatibility.md

    tests:
        name: Tests
        runs-on: ubuntu-latest
        needs:
            - quality
            - metadata

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libglib2.0-0 libgl1

            - name: Install Python dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Download model files
              run: python scripts/download_models.py

            - name: Run tests
              run: pytest

    compatibility:
        name: Contract compatibility
        runs-on: ubuntu-latest
        needs:
            - tests

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libglib2.0-0 libgl1

            - name: Install Python dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Download model files
              run: python scripts/download_models.py

            - name: Run contract tests
              run: pytest tests/unit/contract

            - name: Run privacy tests
              run: pytest tests/unit/privacy

            - name: Run public API tests
              run: pytest tests/unit/api/test_public_api.py

    docker-runtime:
        name: Docker runtime
        runs-on: ubuntu-latest
        needs:
            - compatibility

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Build Docker image
              run: docker build -t age-decision-antispoof:ci .

            - name: Check runtime endpoints
              run: |
                  docker run -d --name age-decision-antispoof -p 8001:8001 age-decision-antispoof:ci
                  sleep 5
                  curl -f http://localhost:8001/health
                  curl -f http://localhost:8001/version
                  curl -f http://localhost:8001/model/status
                  docker rm -f age-decision-antispoof
