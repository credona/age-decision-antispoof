name: CI

on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main

jobs:
    quality:
        name: Quality
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - run: |
                  python -m pip install --upgrade pip
                  pip install ruff

            - run: ruff check .
            - run: ruff format --check .

            - run: scripts/ci/check_all.sh

    metadata:
        name: Metadata
        runs-on: ubuntu-latest
        needs: [quality]

        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - run: python scripts/metadata/check_project_metadata.py
            - run: python scripts/metadata/check_compatibility_metadata.py

    tests:
        name: Tests
        runs-on: ubuntu-latest
        needs: [metadata]

        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - run: |
                  sudo apt-get update
                  sudo apt-get install -y libglib2.0-0 libgl1

            - run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - run: python scripts/models/download_models.py
            - run: pytest

    docker-runtime:
        name: Docker runtime
        runs-on: ubuntu-latest
        needs: [tests]

        steps:
            - uses: actions/checkout@v6

            - run: docker build -t antispoof:ci .

            - run: docker volume create antispoof-models-ci

            - run: |
                  docker run --rm \
                    -v antispoof-models-ci:/app/antispoof/models \
                    antispoof:ci \
                    python scripts/models/download_models.py

            - run: |
                  docker run -d \
                    --name antispoof \
                    -p 8001:8001 \
                    -v antispoof-models-ci:/app/antispoof/models \
                    antispoof:ci

            - run: |
                  for i in {1..30}; do
                    if curl -fsS http://localhost:8001/health; then exit 0; fi
                    sleep 2
                  done
                  exit 1

    auto-tag:
        name: Auto Tag
        runs-on: ubuntu-latest
        needs: [docker-runtime]
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  token: ${{ secrets.AGE_DECISION_RELEASE_TOKEN }}

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.11"

            - run: python scripts/release/create_tag_from_project.py
              env:
                  AGE_DECISION_RELEASE_TOKEN: ${{ secrets.AGE_DECISION_RELEASE_TOKEN }}
